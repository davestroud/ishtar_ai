version: '3'

services:
  asgi:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"  # ASGI API
      - "8501:8501"  # Streamlit UI
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_HOST=host.docker.internal
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_HOST=${PINECONE_HOST}
      - PINECONE_INDEX=${PINECONE_INDEX}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-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}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-ishtar-ai}
      - LANGSMITH_TRACING=true
      - NEWSAPI_KEY=${NEWSAPI_KEY}
    command: poetry run uvicorn asgi_app:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway" 