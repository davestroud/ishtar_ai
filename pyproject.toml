[tool.poetry]
name = "ishtar_ai"
version = "0.1.0"
description = "Ishtar AI - RAG assistant for journalists"
authors = ["Ishtar AI Team"]

[tool.poetry.dependencies]
python = "^3.10"
fastapi = "^0.110"
uvicorn = "^0.27"
langchain = "^0.1"
pinecone-client = "^2.2"
pydantic = "^1.10"
openai = "*"
httpx = "*"
gradio = "*"

[tool.poetry.dev-dependencies]
pytest = "^7.0"

[build-system]
requires = ["poetry-core>=1.5.0"]
build-backend = "poetry.core.masonry.api"
